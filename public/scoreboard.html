<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard - Cricket Voting App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #fff;
      --accent-color: #ffc107;
      --card-bg: #1f1f1f;
      --header-bg: linear-gradient(90deg, #ff5722, #ffc107);
      --button-bg: #ff5722;
      --button-hover: #e64a1;
      --blue-highlight: lightblue;
    }
    body {
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      margin: 0;
    }
    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .header-bar h1 {
      margin: 0;
      padding: 10px;
      background: var(--header-bg);
      border-radius: 12px;
      text-shadow: 2px 2px 5px #000;
      color: var(--accent-color);
      font-size: 1.5em;
    }
    .back-link {
      color: var(--accent-color);
      text-decoration: none;
      background: var(--button-bg);
      padding: 10px 15px;
      border-radius: 8px;
      transition: background 0.3s;
      font-size: 1em;
      margin-top: 10px;
    }
    .back-link:hover {
      background: var(--button-hover);
    }
    /* Enhanced search filter styling */
    #matchSearch {
      width: 100%;
      max-width: 400px;
      padding: 10px 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1em;
      background: #1f1f1f;
      color: #fff;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }
    #matchSearch::placeholder {
      color: #bbb;
    }
    #matchSearch:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
    }
    .table-container {
      overflow-x: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      white-space: nowrap;
    }
    th {
      background: var(--header-bg);
      color: var(--accent-color);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .fixed-col {
      position: sticky;
      left: 0;
      background: var(--card-bg);
      color: var(--accent-color);
      z-index: 4;
    }
    .fixed-col-end {
      position: sticky;
      right: 0;
      background: var(--card-bg);
      color: var(--accent-color);
      z-index: 3;
    }
    .green { 
      background-color: #4CAF50; 
      color: #1a1a1a; 
      padding: 2px 4px;
    }
    .red { 
      background-color: #F44336; 
      color: #1a1a1a; 
      padding: 2px 4px;
    }
    .yellow { 
      background-color: #FFC107; 
      color: #1a1a1a;
    }
    .info-line {
      font-size: 0.9em;
      margin: 2px 0;
    }
    /* Blue highlight style for today's votes */
    .blue-highlight {
      background-color: #fff00ba8;
    }
    /* Responsive adjustments */
    @media (max-width: 600px) {
      table { min-width: 400px; }
      th, td { padding: 6px; font-size: 0.9em; }
      .header-bar h1 { font-size: 1.2em; }
      .back-link { font-size: 0.9em; padding: 8px 12px; }
    }
  </style>
</head>

    const matchesToShow = allMatches.filter(match => {

      return matchDate <= today;
    });

    // --- New sorting logic --- 
    // This will bring today's match(es) to the beginning of the array.
    matchesToShow.sort((a, b) => {
      const aIsToday = new Date(a.date).toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' }) === today;
      const bIsToday = new Date(b.date).toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' }) === today;
      if (aIsToday && !bIsToday) return -1;
      if (!aIsToday && bIsToday) return 1;
      return 0;
    });

    // Fetch voters and results data to build the scoreboard
    Promise.all([
      fetch('/voters').then(res => res.json()),
      fetch('/results').then(res => res.json())
    ]).then(([votersData, resultsData]) => {
      // Build header row: first col = Player Name, one column per match, last col = Current Standing.
      let header = `<tr><th class="fixed-col">Player Name</th>`;
      matchesToShow.forEach(match => {
        header += `<th class="match-col" data-match-title="${match.title}">${match.title}</th>`;
      });
      header += `<th class="fixed-col-end">Current Standing</th></tr>`;
      
      let body = "";
      // Sort voters by currentStanding (descending)
      votersData.votersPool.sort((a, b) => b.currentStanding - a.currentStanding);
      
      const perMatchContri = votersData.votersPool[0].perMatchContri;
      const perMotmContri = votersData.votersPool[0].perMotmContri;
      
      // Merge declared results into matches and set match.startTime
      matchesToShow.forEach(match => {
        const resObj = resultsData.results.find(r => r.matchName === match.title);
        if (resObj) {
          match.winner = resObj.winner;
          match.declaredMotm = resObj.declaredMotm;
          match.cancelled = !!resObj.cancelled;
        }
        const matchDateTime = new Date(`${match.date}T${match.time}:00`);
        match.startTime = matchDateTime.getTime(); // store match start time
        match.freezeTime = match.startTime - 60000;
      });
      
      // For each voter, build row
      votersData.votersPool.forEach(voter => {
        let row = `<tr><td class="fixed-col">${voter.name}</td>`;
        
        matchesToShow.forEach(match => {
          let cellContent = "";

          if (match.cancelled) {
            cellContent = `<div class="info-line">Match Cancelled</div>`;
            row += `<td>${cellContent}</td>`;
            return;

          // New check: if the match has not started yet, hide voting information.
          if (Date.now() < match.startTime) {
            row += `<td><div class="info-line">Voting info hidden until match starts</div></td>`;
            return;
          }
          // If no declared winner or MOTM, show current votes

              cellContent = `<div class="red info-line">No Vote</div>`;
            }
            row += `<td>${cellContent}</td>`;
            return;
          }
          
          // Otherwise we have a declared winner + MOTM
          const userVote = voter.votingInfo.find(v => v.matchName === match.title);
          
          // Compute bonusTeam
          const allVotes = votersData.votersPool.map(v => {
            const vvote = v.votingInfo.find(x => x.matchName === match.title);
            return { 
              votedTeam: vvote ? vvote.votedTeam : null
            };
          });
          const winnersTeam = allVotes.filter(x => x.votedTeam === match.winner);
          const losersTeam  = allVotes.filter(x => x.votedTeam !== match.winner);
          const countWinning = winnersTeam.length;
          const countLosing  = losersTeam.length;
          const totalDeductionTeam = countLosing * perMatchContri;
          const bonusTeam = (countWinning > 0) ? (totalDeductionTeam / countWinning) : 0;
          
          // Compute fallback or primary for MOTM
          const primaryMotmWinners = votersData.votersPool.filter(v => {
            const vvote = v.votingInfo.find(x => x.matchName === match.title);

              return vvote && vvote.votedTeam === match.winner;
            });

          const countWrongMotm = totalVoters - countCorrectMotm;
          const totalDeductionMotm = countWrongMotm * perMotmContri;
          const bonusMotm = (countCorrectMotm > 0) ? (totalDeductionMotm / countCorrectMotm) : 0;

          if (!userVote) {

        let csClass = "";
        if (voter.currentStanding > voter.startingContribution) csClass = "green";
        else if (voter.currentStanding < voter.startingContribution) csClass = "red";
        else csClass = "yellow";
        
        row += `<td class="fixed-col-end ${csClass}">${Math.floor(voter.currentStanding)}</td>`;
        row += `</tr>`;
        body += row;
      });
      
      document.getElementById('scoreboardTable').innerHTML = header + body;
      
      // Implement search filter for match columns.
      const searchInput = document.getElementById('matchSearch');
      searchInput.addEventListener('keyup', function() {
        const filterText = this.value.toLowerCase();
        const headerCells = document.querySelectorAll('#scoreboardTable th.match-col');
        headerCells.forEach((th, index) => {
          const matchTitle = th.getAttribute('data-match-title').toLowerCase();
          const showColumn = matchTitle.indexOf(filterText) > -1;
          th.style.display = showColumn ? "" : "none";
          const rows = document.querySelectorAll('#scoreboardTable tr');
          rows.forEach(row => {
            const cell = row.querySelectorAll('td')[index + 1]; // offset by 1 for Player Name col
            if (cell) {
              cell.style.display = showColumn ? "" : "none";
            }
          });
        });
      });
    });
  </script>
</body>
</html>
