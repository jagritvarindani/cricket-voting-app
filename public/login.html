<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Cricket Voting App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Animated Background */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background: linear-gradient(45deg, #ff004e, #f2a900, #2ce0b9, #00aaff);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  font-family: 'Poppins', sans-serif;
}
/*     .select2-results__option{
      color:#1a1a1a !important;
    } */

/* Gradient Background Animation */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Login Container Styling */
.login-container {
  position: relative;
  background: rgba(0, 0, 0, 0.75);
  padding: 40px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  animation: scaleIn 0.6s ease;
}

/* Scale-in Animation for Container */
@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Decorative Rotating Overlay */
.login-container::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
  animation: rotate 6s linear infinite;
  z-index: 0;
}

/* Rotation Animation */
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Header Styling */
.login-container h2 {
  position: relative;
  z-index: 1;
  text-align: center;
  color: #fff;
  font-size: 2em;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  animation: fadeInDown 1s ease;
}

/* Fade In Down Animation for Header */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Input Field Styling */
input {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 1em;
  outline: none;
  transition: all 0.3s ease;
}
    

/* Input Focus Effect */
input:focus {
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.2);
}

/* Placeholder Styling */
input::placeholder {
  color: rgba(255,255,255,0.7);
}

/* Button Styling */
button {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: linear-gradient(45deg, #ff004e, #00aaff);
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 1em;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  overflow: hidden;
  transition: background 0.3s ease;
}

/* Button Hover Effect */
button:hover {
  background: linear-gradient(45deg, #00aaff, #ff004e);
}

/* Ripple-like Hover Animation for Button */
button::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.4s ease, height 0.4s ease;
}

button:hover::after {
  width: 200%;
  height: 500%;
}

/* Responsive Adjustments */
@media (max-width: 480px) {
  .login-container {
    width: 90%;
    padding: 30px;
  }
}

  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const response = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const result = await response.json();
      if (result.success) {
        localStorage.setItem('user', JSON.stringify(result.user));
        window.location.href = 'voting.html';
      } else {
        alert('Invalid email or password!');
      }
    });
  </script>
</body>
</html>
